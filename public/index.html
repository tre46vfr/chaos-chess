<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaos Chess</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#161512;color:#bababa;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
h1{font-size:22px;font-weight:700;color:#fff;margin-bottom:20px}
h1 span{color:#c9a84c}
#lobby{background:#1e1c1a;border:1px solid #333;border-radius:10px;padding:32px;width:340px;display:flex;flex-direction:column;gap:12px}
#lobby h2{font-size:13px;color:#888;text-transform:uppercase;letter-spacing:.05em}
.btn{width:100%;padding:11px;background:#272522;border:1px solid #444;border-radius:7px;font-size:13px;color:#ccc;cursor:pointer;transition:background .15s}
.btn:hover{background:#333}
.btn.primary{background:#c9a84c;border-color:#c9a84c;color:#000;font-weight:700}
.btn.primary:hover{background:#e0bc5a}
.btn.active{background:#c9a84c;border-color:#c9a84c;color:#000;font-weight:700}
.deprow{display:flex;gap:6px}
.deprow .btn{font-size:12px;padding:7px}
.divider{border:none;border-top:1px solid #2e2c2a}
input{width:100%;padding:10px 12px;background:#272522;border:1px solid #444;border-radius:7px;font-size:13px;color:#fff;outline:none;letter-spacing:.1em}
input:focus{border-color:#c9a84c}
#msg{font-size:12px;color:#888;text-align:center;min-height:18px}
#msg.err{color:#f87171}#msg.ok{color:#4ade80}
#game{display:none;flex-direction:column;align-items:center;gap:12px}
#game-wrap{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
#bcol{display:flex;flex-direction:column;gap:6px}
.pbar{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#272522;border-radius:6px;font-size:13px;color:#ccc}
.dot{width:8px;height:8px;border-radius:50%;background:#555}.dot.on{background:#22c55e}
#board{display:grid;grid-template-columns:repeat(8,62px);grid-template-rows:repeat(8,62px);border:3px solid #8B6914;border-radius:3px}
.sq{width:62px;height:62px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;user-select:none}
.sq.l{background:#F0D9B5}.sq.d{background:#B58863}
.sq.sel{background:#F6F669!important}
.sq.ll{background:#CDD26A!important}.sq.ld{background:#AAA23A!important}
.sq.mv::after{content:'';position:absolute;width:34%;height:34%;border-radius:50%;background:rgba(0,0,0,.22);pointer-events:none;z-index:2}
.sq.cap::after{content:'';position:absolute;inset:0;border-radius:50%;border:6px solid rgba(0,0,0,.22);pointer-events:none;z-index:2}
.sq.chk{background:radial-gradient(circle,rgba(255,0,0,.8) 0%,rgba(231,0,0,.35) 55%,transparent 80%)!important}
.coord{position:absolute;font-size:9px;font-weight:700;pointer-events:none;z-index:3;line-height:1}
.coord.fi{bottom:2px;right:3px}.coord.ra{top:2px;left:3px}
.sq.l .coord{color:#B58863}.sq.d .coord{color:#F0D9B5}
.sq img{width:56px;height:56px;display:block;pointer-events:none;position:relative;z-index:1}
@keyframes chaos{0%{opacity:1;transform:none}25%{opacity:.05;transform:scale(.7)rotate(-15deg)}70%{opacity:.7;transform:scale(1.1)rotate(5deg)}100%{opacity:1;transform:none}}
.ca img{animation:chaos .5s ease}
#sb{width:210px;display:flex;flex-direction:column;gap:10px}
.pan{background:#272522;border:1px solid #3a3a3a;border-radius:8px;padding:12px 14px}
.plbl{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:8px}
.tog{display:flex;align-items:center;gap:9px;padding:7px 10px;border:1px solid #444;border-radius:7px}
.tog.on{border-color:#c9a84c;background:rgba(201,168,76,.1)}
.tl{font-size:13px;color:#888}.tog.on .tl{color:#c9a84c;font-weight:600}
#st{font-size:13px;line-height:1.6;color:#ccc;min-height:20px}
#ml{max-height:120px;overflow-y:auto;font-size:12px}
.mr{display:flex;gap:6px;padding:3px 0;border-bottom:1px solid #2e2c2a}
.mn{color:#555;width:20px;flex-shrink:0}.ms{color:#ccc}.bm{color:#888}
.sbtn{width:100%;background:#1e1c1a;border:1px solid #444;border-radius:7px;font-size:13px;padding:9px;cursor:pointer;color:#ccc;transition:background .15s}
.sbtn:hover{background:#333}
</style>
</head>
<body>
<h1>⚡ <span>Chaos</span> Chess</h1>

<div id="lobby">
  <h2>Gioca vs Umano</h2>
  <button class="btn primary" onclick="createRoom('pvp')">⚔️ Crea partita vs Umano</button>
  <hr class="divider">
  <h2>Gioca vs Stockfish</h2>
  <div class="deprow">
    <button class="btn active" id="dep1" onclick="setDepUI(1,this)">Easy</button>
    <button class="btn" id="dep2" onclick="setDepUI(10,this)">Med</button>
    <button class="btn" id="dep3" onclick="setDepUI(18,this)">Hard</button>
  </div>
  <button class="btn" onclick="createRoom('engine')">🤖 Gioca vs Stockfish</button>
  <hr class="divider">
  <h2>Unisciti a una partita</h2>
  <input type="text" id="room-input" placeholder="Inserisci codice stanza..." maxlength="6" oninput="this.value=this.value.toUpperCase()">
  <button class="btn" onclick="joinRoom()">Entra</button>
  <div id="msg"></div>
</div>

<div id="game">
  <div id="game-wrap">
    <div id="bcol">
      <div class="pbar"><span id="bname">Avversario</span><div class="dot" id="db"></div></div>
      <div id="board"></div>
      <div class="pbar"><span id="myname">Tu</span><div class="dot on" id="dw"></div></div>
    </div>
    <div id="sb">
      <div class="pan">
        <span class="plbl">Stanza</span>
        <div id="room-code" style="color:#c9a84c;font-weight:700;letter-spacing:.1em">-</div>
        <div id="room-info" style="font-size:11px;color:#555;margin-top:4px">Condividi il codice</div>
      </div>
      <div class="pan">
        <span class="plbl">Variant</span>
        <div class="tog on"><span>⚡</span><span class="tl">Chaos: ON</span></div>
      </div>
      <div class="pan">
        <span class="plbl">Status</span>
        <div id="st"><span style="color:#555">In attesa...</span></div>
      </div>
      <div class="pan">
        <button class="sbtn" onclick="leaveGame()">Lascia partita</button>
      </div>
      <div class="pan">
        <span class="plbl">Mosse</span>
        <div id="ml"><span style="color:#555">-</span></div>
      </div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>
</body>
</html>
